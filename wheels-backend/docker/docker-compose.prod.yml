# docker-compose.prod.yml — wheels.com.pk Production Stack

version: '3.9'

services:
  # ─────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: wheels_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wheels_net

  # ─────────────────────────────────────────────
  # Redis Cache
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wheels_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - wheels_net

  # ─────────────────────────────────────────────
  # NestJS Backend API
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: wheels_backend
    restart: always
    env_file:
      - ./backend/.env.production
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    networks:
      - wheels_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ─────────────────────────────────────────────
  # Next.js Admin Panel
  # ─────────────────────────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: wheels_admin
    restart: always
    env_file:
      - ./admin/.env.production
    depends_on:
      - backend
    ports:
      - "3002:3002"
    networks:
      - wheels_net

  # ─────────────────────────────────────────────
  # Nginx Reverse Proxy + SSL
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: wheels_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
      - admin
    networks:
      - wheels_net

  # ─────────────────────────────────────────────
  # Certbot for SSL
  # ─────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: wheels_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    command: certonly --webroot --webroot-path=/var/www/certbot --email admin@wheels.com.pk --agree-tos --no-eff-email -d wheels.com.pk -d www.wheels.com.pk -d api.wheels.com.pk -d admin.wheels.com.pk

volumes:
  postgres_data:
  redis_data:
  certbot_certs:
  certbot_www:

networks:
  wheels_net:
    driver: bridge

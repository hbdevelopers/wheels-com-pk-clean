# docker/nginx/conf.d/wheels.conf
# wheels.com.pk — Production Nginx Configuration

# ── Rate limiting zones ───────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_search:10m  rate=60r/m;
limit_req_zone $binary_remote_addr zone=uploads:10m     rate=10r/m;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# ── Upstream servers ──────────────────────────────────────────
upstream backend {
    server backend:3001;
    keepalive 32;
}

upstream admin {
    server admin:3002;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────
server {
    listen 80;
    server_name wheels.com.pk www.wheels.com.pk api.wheels.com.pk admin.wheels.com.pk;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main API (api.wheels.com.pk) ──────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.wheels.com.pk;

    # ── SSL ───────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/wheels.com.pk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wheels.com.pk/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security Headers ──────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # ── Compression ───────────────────────────────────────────
    gzip on;
    gzip_types application/json application/javascript text/css text/plain;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # ── Connection limits ─────────────────────────────────────
    limit_conn addr 20;
    client_max_body_size 50M;  # for image uploads
    client_body_timeout 30s;
    keepalive_timeout 65;

    # ── WebSocket: Chat ───────────────────────────────────────
    location /socket.io/chat {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── WebSocket: Auctions ───────────────────────────────────
    location /socket.io/auctions {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Auth endpoints (strict rate limit) ───────────────────
    location ~ ^/api/v1/auth/(send-otp|verify-otp) {
        limit_req zone=api_auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Upload endpoints ──────────────────────────────────────
    location ~ ^/api/v1/vehicles/[^/]+/images {
        limit_req zone=uploads burst=5 nodelay;
        client_max_body_size 200M;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # ── Search (generous rate limit) ─────────────────────────
    location /api/v1/vehicles {
        limit_req zone=api_search burst=20 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_authorization;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ── General API ───────────────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=15 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # CORS headers
        add_header Access-Control-Allow-Origin "https://wheels.com.pk" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Health check ──────────────────────────────────────────
    location /health {
        access_log off;
        proxy_pass http://backend/api/v1/health;
    }

    # ── 429 Too Many Requests ─────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
        internal;
        return 429 '{"statusCode":429,"message":"Too many requests. Please slow down.","error":"Too Many Requests"}';
        add_header Content-Type application/json;
    }
}

# ── Admin Panel (admin.wheels.com.pk) ─────────────────────────
server {
    listen 443 ssl http2;
    server_name admin.wheels.com.pk;

    ssl_certificate     /etc/letsencrypt/live/wheels.com.pk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wheels.com.pk/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # IP whitelist for admin (add your office/VPN IPs)
    # allow 203.0.113.0/24;  # Office IP range
    # deny all;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options DENY always;

    location / {
        proxy_pass http://admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── www redirect ──────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name www.wheels.com.pk;
    ssl_certificate     /etc/letsencrypt/live/wheels.com.pk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wheels.com.pk/privkey.pem;
    return 301 https://wheels.com.pk$request_uri;
}
